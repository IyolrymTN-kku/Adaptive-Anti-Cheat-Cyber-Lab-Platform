services:
  kali:
    image: lscr.io/linuxserver/kali-linux:latest
    privileged: true
    ports:
      - "${VNC_PORT}:3000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    networks:
      - cyber_range_net
    restart: unless-stopped
    cap_add:
      - NET_ADMIN

  victim:
    image: ${VULN_IMAGE}
    networks:
      - cyber_range_net
    restart: unless-stopped
    expose:
      - "5000"
      - "8080"
      - "22"

  honeypot:
    image: cowrie/cowrie:latest
    networks:
      - cyber_range_net
    restart: unless-stopped
    expose:
      - "22"
      - "23"

networks:
  cyber_range_net:
    driver: bridge
